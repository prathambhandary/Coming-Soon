<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Official Notice</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #e2e8f0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px 60px;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #020617;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .header {
            font-size: 14px;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .line {
            width: 60px;
            height: 2px;
            background: #475569;
            margin: 20px auto;
        }

        .message {
            font-size: 28px;
            font-weight: bold;
            color: #f8fafc;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">SYSTEM AUTHORIZED DISPLAY</div>
        <div class="title">Notice</div>
        <div class="line"></div>

        <div class="message">
            Gaani anna boli maga
        </div>

        <div class="footer">
            © Secure Display Interface
        </div>
    </div>
</body>
</html>
